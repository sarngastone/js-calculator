<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Calculator</h1>
    <div id="display"></div>
    <div id="buttonsContainer">
        <button class="calcbutton" id="clearbutton">Clear</button>
        <button class="calcbutton">1</button>
        <button class="calcbutton">2</button>
        <button class="calcbutton">3</button>
        <button class="calcbutton">4</button>
        <button class="calcbutton">5</button>
        <button class="calcbutton">6</button>
        <button class="calcbutton">7</button>
        <button class="calcbutton">8</button>
        <button class="calcbutton">9</button>
        <button class="calcbutton">0</button>
        
        <button class="calcbutton" id="addbutton">+</button>
        <button class="calcbutton" id="subtractbutton">-</button>
        <button class="calcbutton" id="multiplybutton">x</button>
        <button class="calcbutton" id="dividebutton">÷</button>
        <button class="calcbutton" id="equalsbutton">=</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
